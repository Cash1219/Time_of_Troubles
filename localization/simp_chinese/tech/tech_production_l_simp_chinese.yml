l_simp_chinese:
 magic_start_power: "魔力"
 magic_start_power_desc: "魔力是世界的架空要素，是万物之始，万物之终。它有着完全的特性，不尽地称呼，无限地可能。但毫无疑问，它即是一，也是万。"
magic_paper_product: "魔力简单储存"
magic_paper_product_desc:"世界上第一张魔力卷轴的出现，让无法感知魔力的麻瓜们获得了施法的能力。从此魔力成为了一种可供流通的商品，为这个世界的技术打开了一条崭新的大门。"
magic_stone_foundation: "魔石勘探"
magic_stone_foundation_desc: "魔法水晶的开采并不是什么先进技术。然而在过去的很长时间里，这种水晶大部分时候都只能作为麻瓜贵族们奢侈收藏品，仅有很少的水晶可以在传奇大法师们的手中大放异彩"
 magic_tools_producion_1: "符文篆刻"
 magic_tools_producion_1_desc: "通过魔法水晶在工具上篆刻符文，我们获得了一种比附魔卷轴效果更强力的强化方式。特别是在符文技术规模化、制式化后，这样的工具已经可以称之为早期魔导器。"
 magic_call_animals: "早期使魔召唤"
 magic_call_animals_desc: "使魔一直是法师们的好帮手。普通人在经过一定训练后，也可以通过魔法卷轴召唤出属于自己的使魔。不过大部分使魔都只具有基础逻辑，使得它们只能在生产中从事一些简单工作。"
 magic_alchemy: "炼金理论"
magic_alchemy_desc: "用魔力将物品嬗变的技术。传说中的炼金术士可以用贤者之石将一切化为黄金。现实中的炼金术学生，却常常在“稳定性”“产量”“可能性”的抉择中痛苦不已。不过一旦踏入了工厂中，选择什么大概就由不得他们了。"
magic_steel:"超魔力结构铸造"
magic_steel_desc:"通过规范化炼金术、纂刻技术、和维多利亚锻钢技术制作的高性能导能材料。上市的第一天就导致魔银价格暴跌，无数不良商贩因此破产倒闭。"
magic_tools_production_2: "正式魔导器铸造"
magic_tools_production_2_desc: "魔钢诞生，进一步深加工得到的初代魔导器。不仅是良好的魔力导体，甚至可以提升持有者的魔力敏感度，后世不少人因此也踏入了魔法冶金的天坑"
magic_fire: "魔素燃烧"
magic_fire_desc: "投入魔力集合体作为助燃物——注意，一次过多的投入量可能导致爆炸等危险情况发生。"
magic_save: "人工奥术结晶"
magic_save_desc: "这一世纪炼金术最伟大的发明、在维持了魔力水晶高魔力浓度有点的同时，剔除了易燃易爆的缺点，同时支持自然充能（极慢）和法师手动充能。"
magic_seed: "魔力栽培"
magic_seed_desc: "通过魔力或是法术刺激植物种子表现出更高产量的性状。旧时只是几位法师互相之间赌斗消遣之事。"
magic_blue_print: "法术蓝图建造"
magic_blue_print_desc: "“曳光、加速、重力、指示···随着工人们撕下一张张卷轴，多种复合法术作用在建筑上。那个时候我以为这是魔法最辉煌的时代，但其实这只是魔法开始的时代。”"
 magic_technical_puppet:"专业化使魔"
 magic_technical_puppet_desc:"经过相关人士专门设计后的魔法傀儡，具有高度专业化、职能化的特征。即便造价高昂，仍旧收到不少实业家青睐。"

